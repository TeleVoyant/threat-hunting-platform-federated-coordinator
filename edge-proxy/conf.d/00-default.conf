# Default vhosts (matched only when no app server_name matches). Drop the distro
# default site (/etc/nginx/sites-enabled/default) so these own the defaults.
#   :80  → redirect to https (+ ACME http-01 challenges later).
#   :443 → self-signed default cert; unmatched hostnames are closed (444).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    # location /.well-known/acme-challenge/ { root /var/www/certbot; }   # Let's Encrypt later
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_certificate     /etc/nginx/certs/default/default_cert.pem;
    ssl_certificate_key /etc/nginx/certs/default/default_key.pem;
    return 444;   # no app vhost matched this hostname
}
