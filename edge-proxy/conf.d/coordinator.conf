# FL coordinator — mTLS-terminating vhost on :8889 (keeps the org-facing URL
# https://13.140.173.164.sslip.io:8889 stable). HOST nginx verifies the client
# cert against the federation CA, then forwards it to the coordinator as
# X-SSL-Client-Cert; the coordinator (FL_TRUSTED_PROXY=1) RE-verifies it
# (CA + CRL + org-active) and resolves the org. This finally makes
# FL_REQUIRE_MTLS=1 real — plain uvicorn never surfaced the client cert.
#
# ssl_verify_client OPTIONAL: enroll-with-token + the operator dashboard work
# WITHOUT a client cert; org /fl/* round endpoints require a verified cert
# (enforced at the app layer by FL_REQUIRE_MTLS=1 in the coordinator).
#
# The coordinator runs in docker, published ONLY on 127.0.0.1:8890 (plain HTTP,
# localhost-only) via docker-compose.mtls.yml — so it is unreachable except via
# this proxy, which is what makes trusting the forwarded cert header safe.

upstream fl_coordinator {
    server 127.0.0.1:8890;          # coordinator docker container, localhost-only publish
}

server {
    listen 8889 ssl;
    listen [::]:8889 ssl;
    server_name 13.140.173.164.sslip.io;

    ssl_certificate         /etc/nginx/certs/fl/coordinator_cert.pem;
    ssl_certificate_key     /etc/nginx/certs/fl/coordinator_key.pem;
    ssl_client_certificate  /etc/nginx/certs/fl/ca_cert.pem;     # client-cert trust anchor
    ssl_verify_client       optional;
    ssl_verify_depth        2;

    location / {
        proxy_pass http://fl_coordinator;
        proxy_set_header Host                $host;
        proxy_set_header X-Forwarded-For     $remote_addr;
        proxy_set_header X-Forwarded-Proto   https;
        proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        proxy_set_header X-SSL-Client-Cert   $ssl_client_escaped_cert;
        proxy_read_timeout 120s;
    }
}
